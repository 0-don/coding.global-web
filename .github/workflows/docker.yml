name: Docker Prod

on:
  workflow_dispatch:
  push:
    branches: [main]
concurrency:
  group: ${{ github.ref }}
  cancel-in-progress: true
jobs:
  build:
    runs-on: self-hosted

    steps:
      - uses: actions/checkout@v4

      - name: Create env file
        run: |
          echo POSTGRES_USER=${{ secrets.POSTGRES_USER }} > .env
          echo POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }} >> .env
          echo POSTGRES_HOST=${{ secrets.POSTGRES_HOST }} >> .env
          echo POSTGRES_DB=${{ secrets.POSTGRES_DB }} >> .env

          echo NEXT_PUBLIC_APP_NAME=${{ secrets.NEXT_PUBLIC_APP_NAME }} >> .env
          echo NEXT_PUBLIC_INVITE_CODE=${{ secrets.NEXT_PUBLIC_INVITE_CODE }} >> .env
          echo NEXT_PUBLIC_URL=${{ secrets.NEXT_PUBLIC_URL }} >> .env

          echo BETTER_AUTH_SECRET=${{ secrets.BETTER_AUTH_SECRET }} >> .env
          echo BETTER_AUTH_URL=${{ secrets.NEXT_PUBLIC_URL }} >> .env

          echo DISCORD_CLIENT_ID=${{ secrets.DISCORD_CLIENT_ID }} >> .env
          echo DISCORD_CLIENT_SECRET=${{ secrets.DISCORD_CLIENT_SECRET }} >> .env

          echo NEXT_PUBLIC_BOT_URL=${{ secrets.NEXT_PUBLIC_BOT_URL }} >> .env
          echo NEXT_PUBLIC_GUILD_ID=${{ secrets.NEXT_PUBLIC_GUILD_ID }} >> .env

          echo NEXT_PUBLIC_POSTHOG_KEY=${{ secrets.NEXT_PUBLIC_POSTHOG_KEY }} >> .env
          echo POSTHOG_API_KEY=${{ secrets.POSTHOG_API_KEY }} >> .env
          echo POSTHOG_ENV_ID=${{ secrets.POSTHOG_ENV_ID }} >> .env

          echo INDEXNOW_KEY=${{ secrets.INDEXNOW_KEY }} >> .env

      # - name: Reset DB
      #   run: docker stop coding-global-web-db || true && docker rm coding-global-web-db || true

      - name: Docker run
        run: docker compose up -d --force-recreate --build

      - name: Wait for site to be healthy
        run: |
          for i in {1..30}; do
            if curl -fsS "${{ secrets.NEXT_PUBLIC_URL }}/api/health" > /dev/null; then
              echo "Site is up"
              exit 0
            fi
            echo "Waiting for site... ($i/30)"
            sleep 5
          done
          echo "Site did not come up in time"
          exit 1

      - name: Submit to IndexNow
        run: |
          docker run --rm \
            --user "$(id -u):$(id -g)" \
            -v "$PWD":/app -w /app \
            -e INDEXNOW_KEY="${{ secrets.INDEXNOW_KEY }}" \
            -e NEXT_PUBLIC_URL="${{ secrets.NEXT_PUBLIC_URL }}" \
            -e HOME=/tmp \
            oven/bun:1-alpine \
            sh -c "bun add indexnow-submitter --no-save && bun scripts/indexnow.ts"
        continue-on-error: true
